function getProductRec(total,items){
  const foods=items.map(i=>i.name.toLowerCase());
  for(const p of PRODUCTS){if(p.triggers(total,foods))return{...p,reasonText:p.reason(total,foods)};}
  return null;
}

// ── SHARE: generate image for Instagram Stories ───────────────────────────
function generateShareImage(result){
  const canvas=document.getElementById("shareCanvas");
  const W=1080,H=1920;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d");
  const t=result.total;

  // Background
  ctx.fillStyle=PINE;ctx.fillRect(0,0,W,H);

  // Top accent
  ctx.fillStyle=ALOE;ctx.fillRect(0,0,W,8);

  // Brand
  ctx.fillStyle=ALOE;ctx.font="bold 48px sans-serif";ctx.textAlign="center";
  ctx.letterSpacing="12px";ctx.fillText("SOHEALTHY",W/2,160);

  ctx.fillStyle="white";ctx.font="bold 80px sans-serif";
  ctx.fillText("Skano Pjatën",W/2,280);

  // Big calorie number
  ctx.fillStyle="white";ctx.font="bold 220px sans-serif";
  ctx.fillText(t.calories,W/2,580);
  ctx.fillStyle=ALOE;ctx.font="bold 60px sans-serif";
  ctx.fillText("kcal",W/2,660);

  // Macro cards
  const macros=[["Proteina",t.protein+"g"],["Karbohidrate",t.carbs+"g"],["Yndyrna",t.fat+"g"],["Fibra",t.fiber+"g"],["Sheqeri",t.sugar+"g"]];
  const cardW=440,cardH=160,gap=40;
  const startX=(W-(cardW*2+gap))/2;
  macros.forEach((m,i)=>{
    const col=i%2,row=Math.floor(i/2);
    const x=startX+col*(cardW+gap);
    const y=760+row*(cardH+gap);
    ctx.fillStyle="rgba(255,255,255,0.12)";
    roundRect(ctx,x,y,cardW,cardH,20);ctx.fill();
    ctx.fillStyle=ALOE;ctx.font="32px sans-serif";ctx.textAlign="center";
    ctx.fillText(m[0],x+cardW/2,y+55);
    ctx.fillStyle="white";ctx.font="bold 60px sans-serif";
    ctx.fillText(m[1],x+cardW/2,y+125);
  });

  // Foods
  ctx.fillStyle="rgba(255,255,255,0.7)";ctx.font="38px sans-serif";ctx.textAlign="center";
  const foodNames=result.items.map(i=>i.name).join(" · ");
  ctx.fillText(foodNames.length>40?foodNames.slice(0,40)+"…":foodNames,W/2,1380);

  // Footer
  ctx.fillStyle=ALOE;ctx.font="bold 42px sans-serif";
  ctx.fillText("scanner.sohealthy.al",W/2,1780);
  ctx.fillStyle="rgba(255,255,255,0.4)";ctx.font="34px sans-serif";
  ctx.fillText("Jo magji. Biologji.",W/2,1860);

  return canvas.toDataURL("image/png");
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

async function shareInstagram(result){
  try{
    const dataUrl=generateShareImage(result);
    const blob=await(await fetch(dataUrl)).blob();
    const file=new File([blob],"sohealthy-scan.png",{type:"image/png"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"SoHealthy Scanner"});
    } else {
      // fallback: download the image
      const a=document.createElement("a");a.href=dataUrl;a.download="sohealthy-scan.png";a.click();
      alert("Foto u shkarkua! Hape në galeri dhe ndaje në Instagram Stories.");
    }
  }catch(e){
    if(e.name!=="AbortError"){
      const dataUrl=generateShareImage(result);
      const a=document.createElement("a");a.href=dataUrl;a.download="sohealthy-scan.png";a.click();
    }
  }
}

function today(){return new Date().toISOString().slice(0,10);}
function getCount(){try{const r=JSON.parse(localStorage.getItem(KEY)||"{}");return r.date===today()?r.count||0:0;}catch{return 0;}}
function bump(){const c=getCount()+1;localStorage.setItem(KEY,JSON.stringify({date:today(),count:c}));return c;}
function saveScanData(t){
  try{const raw=JSON.parse(localStorage.getItem(SCANS_KEY)||"{}");const scans=raw.date===today()?raw.scans||[]:[];scans.push(t);localStorage.setItem(SCANS_KEY,JSON.stringify({date:today(),scans}));}catch{}
}
function getDailyTotals(){
  try{const raw=JSON.parse(localStorage.getItem(SCANS_KEY)||"{}");if(raw.date!==today())return null;const scans=raw.scans||[];if(!scans.length)return null;
  return scans.reduce((a,s)=>({calories:a.calories+(s.calories||0),protein:a.protein+(s.protein||0),carbs:a.carbs+(s.carbs||0),fat:a.fat+(s.fat||0),fiber:a.fiber+(s.fiber||0),sugar:a.sugar+(s.sugar||0),count:a.count+1}),{calories:0,protein:0,carbs:0,fat:0,fiber:0,sugar:0,count:0});}catch{return null;}
}
async function logSheet(res,rt){
  const n=new Date();
  try{await fetch(WEBHOOK,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({date:n.toLocaleDateString("sq-AL"),time:n.toLocaleTimeString("sq-AL"),foods:res.items.map(i=>i.name).join(", "),calories:res.total.calories,protein:res.total.protein,carbs:res.total.carbs,fat:res.total.fat,fiber:res.total.fiber,sugar:res.total.sugar,rating:rt||""})});}catch{}
}
async function analyzeImage(b64,mime){
  const r=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({image:b64,mimeType:mime})});
  const d=await r.json();if(d.error)throw new Error(d.error);return d;
}

    html+=`<div style="background:white;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid rgba(27,63,47,0.08);"><div style="font-size:12px;color:#888;font-family:'Open Sans',sans-serif;margin-bottom:4px;">Vlerëso vaktin (1–10)</div><div style="font-size:10px;color:#bbb;margin-bottom:12px;font-family:'Open Sans',sans-serif;">1 = shumë keq &nbsp;·&nbsp; 10 = perfekt</div><div style="display:flex;gap:6px;flex-wrap:wrap;">${nums.map(n=>{const sel=rating===n;const col=n<=3?GOJI:n<=6?TURMERIC:ALOE;return`<button onclick="setRating(${n})" style="width:44px;height:44px;border-radius:50%;border:2px solid ${sel?col:'rgba(27,63,47,0.15)'};background:${sel?col:'white'};color:${sel?'white':PINE};font-size:15px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;">${n}</button>`;}).join("")}</div></div>`;

    if(rec){html+=`<div style="background:white;border-radius:12px;padding:16px;margin-bottom:16px;border:1.5px solid ${rec.color}40;"><div style="font-size:10px;letter-spacing:2px;color:#888;font-weight:700;margin-bottom:10px;">REKOMANDIM BAZUAR NË ANALIZËN TUAJ</div><div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;"><div style="width:44px;height:44px;background:${rec.color}15;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">${rec.emoji}</div><div><div style="color:${PINE};font-weight:700;font-size:14px;margin-bottom:2px;">${rec.name}</div><div style="color:${rec.color};font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;">${rec.benefit}</div></div></div><p style="color:#555;font-size:12px;font-family:'Open Sans',sans-serif;line-height:1.6;margin-bottom:12px;">${rec.reasonText}</p><a href="${rec.url}" target="_blank" style="display:block;text-align:center;background:${rec.color};color:white;padding:11px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;font-family:'Montserrat',sans-serif;">Porosit Tani →</a></div>`;}

    html+=`<div style="font-size:11px;letter-spacing:2px;color:#888;font-weight:700;margin-bottom:10px;">USHQIMET E DETEKTUARA</div>${result.items.map(item=>`<div style="background:white;border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid rgba(27,63,47,0.08);"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;"><div><div style="color:${PINE};font-weight:700;font-size:14px;">${item.name}</div><div style="color:#888;font-size:12px;font-family:'Open Sans',sans-serif;">${item.portion}</div></div><div style="background:${PINE}20;color:${PINE};padding:4px 10px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap;">${item.calories} kcal</div></div><div style="display:flex;gap:6px;flex-wrap:wrap;">${[["P",item.protein],["K",item.carbs],["Y",item.fat],["F",item.fiber],["Sh",item.sugar]].map(([l,v])=>`<span style="font-size:11px;background:${ALABASTER};border-radius:4px;padding:3px 8px;color:${PINE};">${l}: ${v}g</span>`).join("")}</div></div>`).join("")}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;">
      <button onclick="shareInstagram(currentResult)" style="background:#E1306C;color:white;border:none;padding:14px 8px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;">📸 Instagram</button>
      <button onclick="shareWhatsApp(currentResult)" style="background:#25D366;color:white;border:none;padding:14px 8px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;">💬 WhatsApp</button>
    </div>
    <button onclick="goHome()" style="background:${PINE};color:${ALABASTER};border:none;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;width:100%;margin-top:10px;">+ Skano Pjatë Tjetër</button>
    <div style="text-align:center;color:#888;font-size:12px;margin-top:12px;font-family:'Open Sans',sans-serif;">${MAX-getCount()} skane të mbetura sot</div>`;
  }
  else if(state==="limit"){
    const d3=getDailyTotals();
    html+=`<div style="background:white;border-radius:16px;padding:32px 24px;text-align:center;border:1px solid rgba(183,73,73,0.2);"><div style="font-size:40px;margin-bottom:16px;">⏰</div><p style="color:${PINE};font-weight:700;font-size:16px;margin:0 0 8px;">Limit ditor i arritur</p><p style="color:#888;font-size:13px;font-family:'Open Sans',sans-serif;line-height:1.6;">Keni përdorur të gjitha ${MAX} skanet e sotme.<br>Kthehuni nesër!</p>${d3?`<div style="margin-top:20px;padding:16px;background:${PINE}10;border-radius:12px;"><div style="font-size:11px;letter-spacing:2px;color:${PINE};font-weight:700;margin-bottom:8px;">TOTALI I SOTËM</div><div style="font-size:32px;font-weight:700;color:${PINE};">${d3.calories} <span style="font-size:14px;font-weight:400;">kcal</span></div></div>`:""}</div>`;
  }

  html+=`</div><div style="text-align:center;padding:16px;color:#aaa;font-size:11px;font-family:'Open Sans',sans-serif;">Powered by SoHealthy · Jo magji. Biologji.</div><input id="cam" type="file" accept="image/*" capture="environment" style="display:none"><input id="gal" type="file" accept="image/*" style="display:none">`;
  app.innerHTML=html;
  document.getElementById("cam")?.addEventListener("change",e=>handleFile(e.target.files[0]));
  document.getElementById("gal")?.addEventListener("change",e=>handleFile(e.target.files[0]));
}

let currentResult=null;
function handleFile(f){if(!f)return;imgFile=f;state="ready";errMsg=null;render();}
function goHome(){state="home";imgFile=null;result=null;currentResult=null;errMsg=null;rating=null;render();}
function setRating(r){rating=r;logSheet(result,r);render();}
async function doScan(){
  if(getCount()>=MAX){state="limit";render();return;}
  state="loading";render();
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej();r.readAsDataURL(imgFile);});
    result=await analyzeImage(b64,imgFile.type||"image/jpeg");
    currentResult=result;
    bump();saveScanData(result.total);await logSheet(result,"");state="result";
  }catch(e){errMsg="Gabim gjatë analizës. Provo përsëri.";state="ready";}
  render();
}
window.doScan=doScan;window.goHome=goHome;window.setRating=setRating;
window.shareInstagram=shareInstagram;window.shareWhatsApp=shareWhatsApp;
render();
</script>
</body>
</html>
