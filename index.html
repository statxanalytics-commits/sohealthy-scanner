// ── AUTO PLATE RATING ────────────────────────────────────────────────────
function ratePlate(t, items) {
  const foods = items.map(i=>i.name.toLowerCase());
  let score = 100;
  let issues = [];
  let positives = [];

  // Deductions
  if(t.sugar > 25){ score -= 25; issues.push(`sheqer i lartë (${t.sugar}g)`); }
  else if(t.sugar > 15){ score -= 12; issues.push(`sheqer mesatar (${t.sugar}g)`); }

  if(t.fat > 35){ score -= 20; issues.push(`yndyrna të larta (${t.fat}g)`); }
  else if(t.fat > 25){ score -= 10; issues.push(`yndyrna mesatare (${t.fat}g)`); }

  if(t.fiber < 2){ score -= 20; issues.push(`fibra shumë e ulët (${t.fiber}g)`); }
  else if(t.fiber < 4){ score -= 10; issues.push(`fibra e ulët (${t.fiber}g)`); }

  if(t.protein < 10){ score -= 20; issues.push(`proteina shumë të ulëta (${t.protein}g)`); }
  else if(t.protein < 18){ score -= 10; issues.push(`proteina të ulëta (${t.protein}g)`); }

  if(t.calories > 800){ score -= 15; issues.push(`kalori shumë të larta (${t.calories})`); }
  else if(t.calories > 600){ score -= 5; issues.push(`kalori relativisht të larta`); }

  if(foods.some(x=>/skuq|frit|bacon|salsiçe|suxhuk|fast food|burger/i.test(x))){ score -= 15; issues.push("ushqime të skuqura/të përpunuara"); }

  // Bonuses
  if(t.protein >= 25){ score += 5; positives.push(`proteina të mira (${t.protein}g)`); }
  if(t.fiber >= 6){ score += 5; positives.push(`fibra e mirë (${t.fiber}g)`); }
  if(foods.some(x=>/perime|sallatë|spinaq|brokoli|lakër|domate|kastravec|karrotë/i.test(x))){ score += 5; positives.push("përmban perime"); }
  if(t.calories >= 300 && t.calories <= 550){ score += 5; positives.push("kalori të ekuilibruara"); }

  score = Math.max(0, Math.min(100, score));

  let label, emoji, color, description;
  if(score >= 75){
    label="E Shëndetshme"; emoji="✅"; color=ALOE;
    description = positives.length > 0
      ? `Vakt i ekuilibruar. ${positives.join(", ")}.`
      : "Vakt i ekuilibruar me makro të mira.";
  } else if(score >= 45){
    label="Mesatare"; emoji="⚡"; color=TURMERIC;
    description = issues.length > 0
      ? `Ka hapësirë për përmirësim: ${issues.slice(0,2).join(", ")}.`
      : "Vakt me disa çekuilibra.";
  } else {
    label="Duhet Përmirësuar"; emoji="⚠️"; color=GOJI;
    description = issues.length > 0
      ? `Probleme kryesore: ${issues.slice(0,3).join(", ")}.`
      : "Ky vakt ka çekuilibra të rëndësishme.";
  }

  return { score, label, emoji, color, description };
}

function getProductRec(total, items){
  const foods=items.map(i=>i.name.toLowerCase());
  for(const p of PRODUCTS){
    if(p.triggers(total,foods)) return {...p, reasonText:p.reason(total,foods)};
  }
  return null;
}

function today(){return new Date().toISOString().slice(0,10);}
function getCount(){try{const r=JSON.parse(localStorage.getItem(KEY)||"{}");return r.date===today()?r.count||0:0;}catch{return 0;}}
function bump(){const c=getCount()+1;localStorage.setItem(KEY,JSON.stringify({date:today(),count:c}));return c;}
function saveScanData(t){
  try{const raw=JSON.parse(localStorage.getItem(SCANS_KEY)||"{}");const scans=raw.date===today()?raw.scans||[]:[];scans.push(t);localStorage.setItem(SCANS_KEY,JSON.stringify({date:today(),scans}));}catch{}
}
function getDailyTotals(){
  try{
    const raw=JSON.parse(localStorage.getItem(SCANS_KEY)||"{}");
    if(raw.date!==today())return null;
    const scans=raw.scans||[];if(!scans.length)return null;
    return scans.reduce((a,s)=>({calories:a.calories+(s.calories||0),protein:a.protein+(s.protein||0),carbs:a.carbs+(s.carbs||0),fat:a.fat+(s.fat||0),fiber:a.fiber+(s.fiber||0),sugar:a.sugar+(s.sugar||0),count:a.count+1}),{calories:0,protein:0,carbs:0,fat:0,fiber:0,sugar:0,count:0});
  }catch{return null;}
}
async function logSheet(res,rt){
  const n=new Date();
  try{await fetch(WEBHOOK,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({date:n.toLocaleDateString("sq-AL"),time:n.toLocaleTimeString("sq-AL"),foods:res.items.map(i=>i.name).join(", "),calories:res.total.calories,protein:res.total.protein,carbs:res.total.carbs,fat:res.total.fat,fiber:res.total.fiber,sugar:res.total.sugar,rating:rt||""})});}catch{}
}
async function analyzeImage(b64,mime){
  const r=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({image:b64,mimeType:mime})});
  const d=await r.json();if(d.error)throw new Error(d.error);return d;
}

    if(rec){html+=`<div style="background:white;border-radius:12px;padding:16px;margin-bottom:16px;border:1.5px solid ${rec.color}40;"><div style="font-size:10px;letter-spacing:2px;color:#888;font-weight:700;margin-bottom:10px;">REKOMANDIM BAZUAR NË ANALIZËN TUAJ</div><div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;"><div style="width:44px;height:44px;background:${rec.color}15;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">${rec.emoji}</div><div><div style="color:${PINE};font-weight:700;font-size:14px;margin-bottom:2px;">${rec.name}</div><div style="color:${rec.color};font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;">${rec.benefit}</div></div></div><p style="color:#555;font-size:12px;font-family:'Open Sans',sans-serif;line-height:1.6;margin-bottom:12px;">${rec.reasonText}</p><a href="${rec.url}" target="_blank" style="display:block;text-align:center;background:${rec.color};color:white;padding:11px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;font-family:'Montserrat',sans-serif;">Porosit Tani →</a></div>`;}

    // Per food breakdown
    html+=`<div style="font-size:11px;letter-spacing:2px;color:#888;font-weight:700;margin-bottom:10px;">USHQIMET E DETEKTUARA</div>${result.items.map(item=>`<div style="background:white;border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid rgba(27,63,47,0.08);"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;"><div><div style="color:${PINE};font-weight:700;font-size:14px;">${item.name}</div><div style="color:#888;font-size:12px;font-family:'Open Sans',sans-serif;">${item.portion}</div></div><div style="background:${PINE}20;color:${PINE};padding:4px 10px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap;">${item.calories} kcal</div></div><div style="display:flex;gap:6px;flex-wrap:wrap;">${[["P",item.protein],["K",item.carbs],["Y",item.fat],["F",item.fiber],["Sh",item.sugar]].map(([l,v])=>`<span style="font-size:11px;background:${ALABASTER};border-radius:4px;padding:3px 8px;color:${PINE};">${l}: ${v}g</span>`).join("")}</div></div>`).join("")}`;

    html+=`<button onclick="goHome()" style="background:${PINE};color:${ALABASTER};border:none;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;width:100%;margin-top:8px;">+ Skano Pjatë Tjetër</button><div style="text-align:center;color:#888;font-size:12px;margin-top:12px;font-family:'Open Sans',sans-serif;">${MAX-getCount()} skane të mbetura sot</div>`;
  }
  else if(state==="limit"){
    const d3=getDailyTotals();
    html+=`<div style="background:white;border-radius:16px;padding:32px 24px;text-align:center;border:1px solid rgba(183,73,73,0.2);"><div style="font-size:40px;margin-bottom:16px;">⏰</div><p style="color:${PINE};font-weight:700;font-size:16px;margin:0 0 8px;">Limit ditor i arritur</p><p style="color:#888;font-size:13px;font-family:'Open Sans',sans-serif;line-height:1.6;">Keni përdorur të gjitha ${MAX} skanet e sotme.<br>Kthehuni nesër!</p>${d3?`<div style="margin-top:20px;padding:16px;background:${PINE}10;border-radius:12px;"><div style="font-size:11px;letter-spacing:2px;color:${PINE};font-weight:700;margin-bottom:8px;">TOTALI I SOTËM</div><div style="font-size:32px;font-weight:700;color:${PINE};">${d3.calories} <span style="font-size:14px;font-weight:400;">kcal</span></div></div>`:""}</div>`;
  }

  html+=`</div><div style="text-align:center;padding:16px;color:#aaa;font-size:11px;font-family:'Open Sans',sans-serif;">Powered by SoHealthy · Jo magji. Biologji.</div><input id="cam" type="file" accept="image/*" capture="environment" style="display:none"><input id="gal" type="file" accept="image/*" style="display:none">`;
  app.innerHTML=html;
  document.getElementById("cam")?.addEventListener("change",e=>handleFile(e.target.files[0]));
  document.getElementById("gal")?.addEventListener("change",e=>handleFile(e.target.files[0]));
}

function handleFile(f){if(!f)return;imgFile=f;state="ready";errMsg=null;render();}
function goHome(){state="home";imgFile=null;result=null;errMsg=null;render();}
async function doScan(){
  if(getCount()>=MAX){state="limit";render();return;}
  state="loading";render();
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej();r.readAsDataURL(imgFile);});
    result=await analyzeImage(b64,imgFile.type||"image/jpeg");
    const plate=ratePlate(result.total,result.items);
    bump();saveScanData(result.total);await logSheet(result,plate.label);state="result";
  }catch(e){errMsg="Gabim gjatë analizës. Provo përsëri.";state="ready";}
  render();
}
window.doScan=doScan;window.goHome=goHome;
render();
</script>
</body>
</html>
